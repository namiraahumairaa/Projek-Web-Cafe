<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI SUDUT- Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="desktop-wrapper">
        <aside class="sidebar">
            <div class="brand-section">
                <div class="icon-cafe">☕</div>
                <h2>KOPI SUDUT</h2>
            </div>
            <nav class="side-nav">
                <a href="index.html">⬅ Kembali ke Menu</a>
                <a href="cart.html">🛒 Lihat Keranjang</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Konfirmasi Pemesanan</h2>
            </header>

            <div class="checkout-grid">
                <section class="checkout-form">
                    <form action="#">
                        <h3>Informasi Pelanggan</h3>
                        <div class="form-group">
                            <label for="name">Nama Lengkap</label>
                            <input type="text" id="name" placeholder="Contoh: Budi Santoso" required>
                        </div>
                        <div class="form-group">
                            <label for="table">Nomor Meja</label>
                            <input type="number" id="table" value="12" readonly>
                        </div>
                        <div class="form-group">
                            <label for="notes">Catatan Tambahan</label>
                            <textarea id="notes" rows="4" placeholder="Contoh: Gula dipisah, tanpa es batu"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Metode Pembayaran</label>
                            <select id="payment-method-selector">
                                <option value="qris">QRIS / E-Wallet</option>
                                <option value="mbanking">M-Banking (Transfer Bank)</option>
                                <option value="kasir">Bayar di Kasir (Tunai)</option>
                            </select>
                        </div>
                    </form>
                </section>

                <section class="order-preview">
                    <h3>Ringkasan Pembayaran</h3>
                    
                    <div class="preview-item" style="align-items: center; margin-bottom: 20px;">
                        <img src="img/amerikano.jpg" alt="Amerikano" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 10px;">
                        <div style="flex: 1;">
                            <p style="font-weight: bold; font-size: 0.9rem;">Amerikano</p>
                            <p style="font-size: 0.8rem; color: #777;">Qty: 1</p>
                        </div>
                        <span style="font-weight: bold;">Rp 20.000</span>
                    </div>

                    <div class="preview-item">
                        <span>Subtotal</span>
                        <span>Rp 20.000</span>
                    </div>
                    <div class="preview-item">
                        <span>Pajak (10%)</span>
                        <span>Rp 2.000</span>
                    </div>
                    <hr style="margin-bottom: 15px; opacity: 0.2;">
                    <div class="preview-item total">
                        <span>Total Bayar</span>
                        <span>Rp 22.000</span>
                    </div>
                    
                    <a href="status.html" class="btn-confirm-final" style="text-decoration: none; display: block; text-align: center;">Konfirmasi Pembayaran</a>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
