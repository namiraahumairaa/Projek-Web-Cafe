<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI SUDUT - Keranjang Belanja</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="desktop-wrapper">
        <aside class="sidebar">
            <div class="brand-section">
                <div class="icon-cafe">☕</div>
                <h2>KOPI SUDUT</h2>
            </div>
            <nav class="side-nav">
                <a href="index.html">Coffee</a>
                <a href="index.html#Non Coffee">Non Coffee</a>
                <a href="index.html#breakfast">Breakfast</a>
                <a href="index.html#lunch">Lunch</a>
                <a href="index.html#dessert">Dessert & Snack</a>
                <hr>
                <a href="#" class="active">Keranjang</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Keranjang Belanja Anda</h2>
            </header>

            <section class="cart-table-container">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Produk</th>
                            <th>Harga</th>
                            <th>Jumlah</th>
                            <th>Subtotal</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tempat-data-keranjang"></tbody>
                </table>

                <div class="cart-summary-box">
                    <h3>Ringkasan Pesanan</h3>
                    <div class="summary-item">
                        <span>Total</span>
                        <span class="total-price" id="total-belanjaan">Rp 0</span>
                    </div>
                    <a href="checkout.html" class="btn-confirm-final" style="text-decoration: none; display: block; text-align: center;">Lanjut ke Pembayaran</a>
                </div>
            </section>
        </main>
    </div>

    <script type="text/javascript">
        function tampilkanData() {
            var dataLokal = localStorage.getItem("cartKS");
            var tempatTabel = document.getElementById("tempat-data-keranjang");
            var tempatTotal = document.getElementById("total-belanjaan");
            
            var barisHtml = "";
            var totalHarga = 0;

            if (dataLokal === null || JSON.parse(dataLokal).length === 0) {
                tempatTabel.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color:#999; font-weight:bold;">Keranjang belanja Anda kosong!</td></tr>';
                tempatTotal.innerText = "Rp 0";
                return;
            }

            var listBelanja = JSON.parse(dataLokal);

            listBelanja.forEach(function(barang, urutan) {
                var namaTampil = barang.nama ? barang.nama : "Menu Kopi Pilihan";
                var hargaTampil = barang.harga ? barang.harga : 20000; 
                
                var subtotal = hargaTampil * barang.qty;
                totalHarga += subtotal;

                barisHtml += '<tr>' +
                    '<td><b>' + namaTampil + '</b></td>' +
                    '<td>Rp ' + hargaTampil.toLocaleString('id-ID') + '</td>' +
                    '<td>' +
                        '<div class="qty-stepper">' +
                            '<button type="button" onclick="ubahJumlah(' + urutan + ', -1)">-</button>' +
                            '<input type="number" value="' + barang.qty + '" readonly style="width: 40px; text-align: center; margin: 0 5px;">' +
                            '<button type="button" onclick="ubahJumlah(' + urutan + ', 1)">+</button>' +
                        '</div>' +
                    '</td>' +
                    '<td>Rp ' + subtotal.toLocaleString('id-ID') + '</td>' +
                    '<td><button type="button" class="btn-remove" onclick="hapusItem(' + urutan + ')">Hapus</button></td>' + // SINKRON: Sekarang menggunakan class="btn-remove"
                '</tr>';
            });

            tempatTabel.innerHTML = barisHtml;
            tempatTotal.innerText = "Rp " + totalHarga.toLocaleString('id-ID');
        }

        function ubahJumlah(index, perubahan) {
            var data = JSON.parse(localStorage.getItem("cartKS"));
            data[index].qty += perubahan;
            if (data[index].qty < 1) data[index].qty = 1;
            localStorage.setItem("cartKS", JSON.stringify(data));
            tampilkanData();
        }

        function hapusItem(index) {
            var data = JSON.parse(localStorage.getItem("cartKS"));
            data.splice(index, 1);
            localStorage.setItem("cartKS", JSON.stringify(data));
            tampilkanData();
        }

        window.onload = tampilkanData;
    </script>
</body>
</html>
