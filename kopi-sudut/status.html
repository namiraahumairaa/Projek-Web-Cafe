<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KOPI SUDUT - Status Pesanan</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-container { max-width: 600px; margin: 40px auto; text-align: center; }
        .status-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .stepper-status { display: flex; justify-content: space-between; margin: 30px 0; }
        .stepper-item { flex: 1; text-align: center; }
        .step-counter { width: 40px; height: 40px; border-radius: 50%; background: #dfe6e9; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .stepper-item.completed .step-counter { background: #2ecc71; color: white; }
        .stepper-item.active .step-counter { background: #e67e22; color: white; }
        .status-label { font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="status-card">
            <h3 id="sapaan-pelanggan">Memuat status pesanan...</h3>
            <p id="info-status" style="margin-bottom: 30px;">Menghubungkan ke meja kasir...</p>

            <div class="stepper-status">
                <div id="step-validasi" class="stepper-item">
                    <div class="step-counter">1</div>
                    <div class="status-label">Divalidasi</div>
                </div>
                <div id="step-masak" class="stepper-item">
                    <div class="step-counter">2</div>
                    <div class="status-label">Diproses</div>
                </div>
                <div id="step-siap" class="stepper-item">
                    <div class="step-counter">3</div>
                    <div class="status-label">Siap Diambil</div>
                </div>
            </div>
            <a href="index.html" class="btn-primary" style="display:inline-block; text-decoration:none; padding:10px 20px;">Kembali ke Menu</a>
        </div>
    </div>

    <script type="text/javascript">
        var sudahAlert = false;

        function pantauStatusRiil() {
            var pesananLokal = localStorage.getItem("dataPesanan");
            var sapaan = document.getElementById("sapaan-pelanggan");
            var info = document.getElementById("info-status");
            var step1 = document.getElementById("step-validasi");
            var step2 = document.getElementById("step-masak");
            var step3 = document.getElementById("step-siap");

            if (pesananLokal) {
                var arrayPesanan = JSON.parse(pesananLokal);
                
                if (arrayPesanan && arrayPesanan.length > 0) {
                    var notaTerakhir = arrayPesanan[arrayPesanan.length - 1];

                    var namaUser = notaTerakhir.namaPelanggan ? notaTerakhir.namaPelanggan : "Pelanggan";
                    var statusKini = notaTerakhir.status ? notaTerakhir.status.toLowerCase().trim() : "pending";

                    sapaan.innerText = "Hai, " + namaUser + "!";

                    if (statusKini === "pending") {
                        step1.className = "stepper-item active";
                        step2.className = "stepper-item";
                        step3.className = "stepper-item";
                        step1.querySelector(".step-counter").innerText = "1";
                        step2.querySelector(".step-counter").innerText = "2";
                        step3.querySelector(".step-counter").innerText = "3";
                        info.innerText = "Pesanan Anda sudah terkirim. Menunggu validasi kasir...";
                    }

                    // DI SINI SUDAH FIX MEMAKAI KATA "DIPROSES" LUAR DALAM
                    else if (statusKini === "diproses") {
                        step1.className = "stepper-item completed";
                        step2.className = "stepper-item active";
                        step3.className = "stepper-item";
                        step1.querySelector(".step-counter").innerText = "✓";
                        step2.querySelector(".step-counter").innerText = "2";
                        step3.querySelector(".step-counter").innerText = "3";
                        info.innerText = "Pesanan Anda sedang diproses, mohon tunggu sebentar ya 😊.";
                    } 
 
                    else if (statusKini === "siap") {
                        step1.className = "stepper-item completed";
                        step2.className = "stepper-item completed";
                        step3.className = "stepper-item active";
                        step1.querySelector(".step-counter").innerText = "✓";
                        step2.querySelector(".step-counter").innerText = "✓";
                        step3.querySelector(".step-counter").innerText = "3";
                        info.innerHTML = "<b style='color:green;'>Pesanan Selesai! Silakan ambil di meja pesanan.</b>";
                        
                        if (!sudahAlert) {
                            alert("Pesanan Anda sudah SIAP DIAMBIL! Selamat menikmati hidangan Anda di KOPI SUDUT ☕🍽️");
                            sudahAlert = true; 
                        }
                    }
                } else {
                    sapaan.innerText = "Belum Ada Pesanan";
                    info.innerText = "Silakan lakukan pemesanan menu terlebih dahulu.";
                }
            } else {
                sapaan.innerText = "Belum Ada Pesanan";
                info.innerText = "Silakan lakukan pemesanan menu terlebih dahulu.";
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            pantauStatusRiil();
            setInterval(pantauStatusRiil, 1000);
        });
    </script>
</body>
</html>
