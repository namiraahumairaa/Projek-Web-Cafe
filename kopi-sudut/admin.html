<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KOPI SUDUT - Dashboard kasir</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-box { max-width: 600px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .btn-update { padding: 12px 25px; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 5px; }
        .btn-success { padding: 12px 25px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 5px; }
        .note-box { background: #fff8db; border-left: 4px solid #f1c40f; padding: 10px; margin: 15px 0; text-align: left; font-size: 0.9rem; border-radius: 4px; }
        .item-list { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>👨‍🍳 Halaman kasir (Admin)</h2>
        <hr style="margin: 20px 0; opacity: 0.2;">
        <div id="konten-pesanan">
            <p style="color: #999;">Memeriksa pesanan masuk...</p>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script type="text/javascript">
        $(document).ready(function() {
            
            function cekPesananMasuk() {
                var pesananLokal = localStorage.getItem("dataPesanan");
                if (pesananLokal) {
                    var arrayPesanan = JSON.parse(pesananLokal);
                    if (arrayPesanan && arrayPesanan.length > 0) {
                        var nota = arrayPesanan[arrayPesanan.length - 1];
                        var teksCatatan = nota.catatanPesanan ? nota.catatanPesanan : "<i>Tidak ada catatan.</i>";
                        var statusKini = nota.status.toLowerCase().trim();
                        var htmlMenu = "<div class='item-list'><strong>Daftar Menu:</strong><ul>";
                        if(nota.itemDibelanja && nota.itemDibelanja.length > 0) {
                            nota.itemDibelanja.forEach(function(produk) {
                                htmlMenu += "<li>" + produk.nama + " (x" + produk.qty + ")</li>";
                            });
                        } else {
                            htmlMenu += "<li>Menu Pilihan</li>";
                        }
                        htmlMenu += "</ul></div>";

                        if (statusKini === "pending") {
                            $("#konten-pesanan").html(
                                "<h3>Pesanan Baru Meja " + nota.meja + ": <b style='color:#2980b9;'>" + nota.namaPelanggan + "</b></h3>" +
                                htmlMenu +
                                "<div class='note-box'><b>Catatan:</b> " + teksCatatan + "</div>" +
                                "<p style='margin-bottom:20px; color:#7f8c8d; font-weight:bold;'>Status: Menunggu Validasi</p>" +
                                "<button type='button' class='btn-update' id='btn-masak'>👨‍🍳 Mulai Diproses</button>"
                            );
                        } 
                        else if (statusKini === "diproses") {
                            $("#konten-pesanan").html(
                                "<h3>Sedang Memasak Pemesanan Meja " + nota.meja + " (" + nota.namaPelanggan + ")</h3>" +
                                htmlMenu +
                                "<div class='note-box'><b>Catatan:</b> " + teksCatatan + "</div>" +
                                "<p style='margin-bottom:20px; color:#e67e22; font-weight:bold;'>Status: Sedang Disiapkan</p>" +
                                "<button type='button' class='btn-success' id='btn-selesai'>✅ Siap Diambil</button>"
                            );
                        } 
                        else if (statusKini === "siap") {
                            $("#konten-pesanan").html(
                                "<h3>Pesanan Meja " + nota.meja + " (" + nota.namaPelanggan + ") Selesai!</h3>" +
                                "<p style='color:#2ecc71; font-weight:bold; margin-top:15px;'>Menunggu pembeli mengambil hidangan di meja kasir... ☕</p>" +
                                "<button type='button' style='margin-top:20px; padding:8px 15px; cursor:pointer;' id='btn-reset'>Bersihkan Layar Antrean</button>"
                            );
                        }
                    } else {
                        $("#konten-pesanan").html("<p style='color:#999;'>Belum ada pesanan baru dari pelanggan.</p>");
                    }
                } else {
                    $("#konten-pesanan").html("<p style='color:#999;'>Belum ada pesanan baru dari pelanggan.</p>");
                }
            }

            cekPesananMasuk();
            setInterval(cekPesananMasuk, 2000);
            $(document).on("click", "#btn-masak", function() {
                var pesananLokal = localStorage.getItem("dataPesanan");
                if (pesananLokal) {
                    var arrayPesanan = JSON.parse(pesananLokal);
                    arrayPesanan[arrayPesanan.length - 1].status = "diproses";
                    localStorage.setItem("dataPesanan", JSON.stringify(arrayPesanan));
                    alert("Pesanan berhasil diproses.");
                    cekPesananMasuk();
                }
            });

            $(document).on("click", "#btn-selesai", function() {
                var pesananLokal = localStorage.getItem("dataPesanan");
                if (pesananLokal) {
                    var arrayPesanan = JSON.parse(pesananLokal);
                    arrayPesanan[arrayPesanan.length - 1].status = "siap";
                    localStorage.setItem("dataPesanan", JSON.stringify(arrayPesanan));
                    alert("Status pesanan berhasil diubah! Pembeli akan menerima notifikasi Siap Diambil.");
                    cekPesananMasuk();
                }
            });

            $(document).on("click", "#btn-reset", function() {
                localStorage.removeItem("dataPesanan");
                alert("Layar antrean kasir berhasil dibersihkan!");
                cekPesananMasuk();
            });
        });
    </script>
</body>
</html>
