<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI SUDUT - Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="desktop-wrapper">
        <aside class="sidebar">
            <div class="brand-section">
                <div class="icon-cafe">☕</div>
                <h2>KOPI SUDUT</h2>
            </div>
            <nav class="side-nav">
                <a href="index.html">⬅ Kembali ke Menu</a>
                <a href="cart.html">🛒 Lihat Keranjang</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Konfirmasi Pemesanan</h2>
            </header>

            <section class="cart-table-container" style="display: flex; gap: 20px; align-items: flex-start;">
                <div style="flex: 2; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 20px; color: #333;">Informasi Pelanggan</h3>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nama Lengkap</label>
                        <input type="text" id="nama-pelanggan" placeholder="Contoh: Budi Santoso" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nomor Meja</label>
                        <input type="text" id="nomor-meja" placeholder="Masukkan Nomor Meja Anda (Contoh: 05)" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Catatan Pesanan</label>
                        <textarea id="catatan-pesanan" placeholder="Contoh: Kopi jangan terlalu manis, banyakin es" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; height: 80px; resize: none;"></textarea>
                    </div>
                </div>

                <div class="cart-summary-box" style="flex: 1; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 0;">
                    <h3 style="margin-bottom: 15px; color: #333;">Ringkasan Pembayaran</h3>
                    
                    <div id="daftar-item-checkout"></div>
                    
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                    
                    <div class="summary-item" style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">Rp 0</span>
                    </div>
                    <div class="summary-item" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <span>Pajak (10%)</span>
                        <span id="checkout-pajak">Rp 0</span>
                    </div>
                    
                    <div class="summary-item" style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2em; margin-bottom: 20px;">
                        <span>Total Bayar</span>
                        <span class="total-price" id="checkout-total-akhir" style="color: #e67e22;">Rp 0</span>
                    </div>
                    
                    <button type="button" onclick="prosesBayarFinal()" class="btn-confirm-final" style="width: 100%; border: none; cursor: pointer;">Konfirmasi Pembayaran</button>
                </div>
            </section>
        </main>
    </div>

    <script type="text/javascript">
        function muatRingkasanCheckout() {
            var dataLokal = localStorage.getItem("cartKS");
            var wadahItem = document.getElementById("daftar-item-checkout");
            var wadahSubtotal = document.getElementById("checkout-subtotal");
            var wadahPajak = document.getElementById("checkout-pajak");
            var wadahTotalAkhir = document.getElementById("checkout-total-akhir");

            if (!dataLokal || JSON.parse(dataLokal).length === 0) {
                wadahItem.innerHTML = '<p style="color:#999; text-align:center;">Tidak ada pesanan.</p>';
                return;
            }

            var listBelanja = JSON.parse(dataLokal);
            var HTMLItem = "";
            var subtotal = 0;

            listBelanja.forEach(function(barang) {
                var namaValid = barang.nama ? barang.nama : "Menu Pilihan";
                var hargaValid = barang.harga ? barang.harga : 20000;
                
                var totalPerItem = hargaValid * barang.qty;
                subtotal += totalPerItem;

                HTMLItem += '<div style="margin-bottom: 10px; font-size: 0.95em;">' +
                    '<div style="display:flex; justify-content:space-between; font-weight:bold;">' +
                        '<span>' + namaValid + '</span>' +
                        '<span>Rp ' + totalPerItem.toLocaleString('id-ID') + '</span>' +
                    '</div>' +
                    '<div style="color:#777; font-size: 0.85em;">Qty: ' + barang.qty + '</div>' +
                '</div>';
            });

            var pajak = subtotal * 0.1;
            var totalAkhir = subtotal + pajak;

            wadahItem.innerHTML = HTMLItem;
            wadahSubtotal.innerText = "Rp " + subtotal.toLocaleString('id-ID');
            wadahPajak.innerText = "Rp " + pajak.toLocaleString('id-ID');
            wadahTotalAkhir.innerText = "Rp " + totalAkhir.toLocaleString('id-ID');
        }

        function prosesBayarFinal() {
            var namaPelanggan = document.getElementById("nama-pelanggan").value.trim();
            var noMeja = document.getElementById("nomor-meja").value.trim();
            var catatan = document.getElementById("catatan-pesanan").value.trim();

            if (namaPelanggan === "") {
                alert("Mohon masukkan Nama Lengkap Anda terlebih dahulu!");
                return;
            }

            if (noMeja === "") {
                alert("Mohon masukkan Nomor Meja Anda terlebih dahulu sebelum memesan!");
                return;
            }

            var dataKeranjang = localStorage.getItem("cartKS");
            if (!dataKeranjang || JSON.parse(dataKeranjang).length === 0) {
                alert("Keranjang belanja kosong, gagal memproses pesanan!");
                return;
            }

            var pesananLama = localStorage.getItem("dataPesanan");
            var arrayPesananAdmin = pesananLama ? JSON.parse(pesananLama) : [];

            var notaBaru = {
                idPesanan: "ORD-" + Date.now(),
                namaPelanggan: namaPelanggan,
                meja: noMeja,
                catatanPesanan: catatan ? catatan : "-",
                itemDibelanja: JSON.parse(dataKeranjang),
                status: "Pending" 
            };

            arrayPesananAdmin.push(notaBaru);
            localStorage.setItem("dataPesanan", JSON.stringify(arrayPesananAdmin));
            
            alert("Terima kasih " + namaPelanggan + ", pesanan Anda berhasil! Silahkan melakukan pembayaran di kasir untuk meja nomor: " + noMeja);
            
            localStorage.removeItem("cartKS");
            localStorage.removeItem("cart");
            
            window.location.href = "status.html";
        }

        window.onload = muatRingkasanCheckout;
    </script>
</body>
</html>
